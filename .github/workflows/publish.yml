name: publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if it does not exist."
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft?"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  # Serialize per release tag, regardless of whether we got here via a tag push
  # (github.ref_name = "vX.Y.Z") or a workflow_dispatch with an explicit `tag`
  # input.
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve release inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      draft: ${{ steps.derive.outputs.draft }}
    steps:
      - id: derive
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRAFT: ${{ inputs.draft }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "draft=${INPUT_DRAFT:-true}" >> "$GITHUB_OUTPUT"
          fi

  build-deb:
    name: build .deb (${{ matrix.target }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: publish-${{ matrix.target }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cross,cargo-deb
      - name: Cross-build release
        run: cross build -p tbo-tui --release --target ${{ matrix.target }}
      - name: Build .deb
        # --no-strip: the release profile already strips via the Rust linker;
        # running cargo-deb's host `strip` on a cross-compiled binary fails
        # because the host strip is x86_64.
        run: cargo deb -p tbo-tui --no-build --no-strip --target ${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb
      # Reuse the cross-built binary to publish a Homebrew (Linux) tarball for
      # the arches Homebrew-on-Linux supports: x86_64 (intel) and arm64 (arm).
      # armv7 is skipped because Homebrew has no 32-bit ARM support.
      - name: Pack Homebrew tarball
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/tb-operator-${{ matrix.target }}.tar.gz \
              tb-operator
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu' }}
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz

  build-tarball:
    name: build tarball (${{ matrix.target }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo build -p tbo-tui --release --target ${{ matrix.target }}
      - name: Pack tarball
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/tb-operator-${{ matrix.target }}.tar.gz \
              tb-operator
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    needs: [resolve, build-deb, build-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -lh release/
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          draft: ${{ needs.resolve.outputs.draft == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*

  homebrew:
    name: bump Homebrew formula
    needs: [resolve, release]
    runs-on: ubuntu-latest
    # Only update the public tap for real (non-draft) releases.
    if: ${{ needs.resolve.outputs.draft != 'true' }}
    permissions:
      contents: read
    steps:
      - name: Check for tap token
        id: token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_TOKEN is not set; skipping Homebrew formula bump."
          fi
      - name: Update formula in djensenius/homebrew-tap
        if: ${{ steps.token.outputs.present == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/${REPO}/releases/download/${TAG}"

          macos_arm_asset="tb-operator-aarch64-apple-darwin.tar.gz"
          linux_x86_asset="tb-operator-x86_64-unknown-linux-gnu.tar.gz"
          linux_arm_asset="tb-operator-aarch64-unknown-linux-gnu.tar.gz"

          # Hash exactly what users will download.
          gh release download "$TAG" --repo "$REPO" --dir dl \
            --pattern "$macos_arm_asset" \
            --pattern "$linux_x86_asset" \
            --pattern "$linux_arm_asset"
          sha() { sha256sum "dl/$1" | cut -d' ' -f1; }
          macos_arm_sha="$(sha "$macos_arm_asset")"
          linux_x86_sha="$(sha "$linux_x86_asset")"
          linux_arm_sha="$(sha "$linux_arm_asset")"
          echo "version=$version"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/djensenius/homebrew-tap.git" tap
          formula="tap/Formula/telephone-booth-operator-cli.rb"

          # Regenerate the whole formula so every platform's url/sha256 stays in
          # sync (a single sed can't disambiguate the per-platform blocks).
          cat > "$formula" <<EOF
          class TelephoneBoothOperatorCli < Formula
            desc "Terminal operator console (TUI) for the Telephone-Booth installation"
            homepage "https://github.com/djensenius/Telephone-Booth-Operator-cli"
            version "${version}"
            license "Apache-2.0"
  
            # Prebuilt binaries. The release pipeline regenerates this file
            # (version, urls, and sha256s) on each tagged, non-draft release.
            # macOS is Apple Silicon only; Linux covers x86_64 and arm64.
            on_macos do
              on_arm do
                url "${base}/${macos_arm_asset}"
                sha256 "${macos_arm_sha}"
              end
            end
  
            on_linux do
              on_intel do
                url "${base}/${linux_x86_asset}"
                sha256 "${linux_x86_sha}"
              end
              on_arm do
                url "${base}/${linux_arm_asset}"
                sha256 "${linux_arm_sha}"
              end
            end
  
            def install
              bin.install "tb-operator"
            end
  
            test do
              assert_match "tb-operator", shell_output("#{bin}/tb-operator --version")
            end
          end
          EOF

          cd tap
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "telephone-booth-operator-cli ${version}"
          git push origin main

  dispatch-apt:
    name: dispatch APT publish
    needs: [resolve, release]
    runs-on: ubuntu-latest
    # Only refresh the shared APT repo for real (non-draft) releases.
    if: ${{ needs.resolve.outputs.draft != 'true' }}
    permissions:
      contents: read
    env:
      # The .debs are published into the Telephone-Booth project's existing
      # shared APT repo (its gh-pages). That repo's publish-apt.yml accepts a
      # `source_repo` input so this CLI can contribute its packages.
      APT_REPO: djensenius/Telephone-Booth
    steps:
      - name: Check for dispatch token
        id: token
        env:
          APT_DISPATCH_TOKEN: ${{ secrets.APT_DISPATCH_TOKEN }}
        run: |
          if [ -n "$APT_DISPATCH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APT_DISPATCH_TOKEN is not set; skipping shared APT publish. The .debs remain attached to the GitHub release."
          fi
      - name: Dispatch publish-apt on the shared APT repo
        if: ${{ steps.token.outputs.present == 'true' }}
        env:
          # A PAT with actions:write on the APT repo — GITHUB_TOKEN cannot
          # trigger workflows in another repository.
          GH_TOKEN: ${{ secrets.APT_DISPATCH_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -eu
          echo "Dispatching publish-apt.yml on $APT_REPO for $TAG (source=$SOURCE_REPO)"
          # Record the latest run id so we can confirm a new one registers.
          previous_id="$(gh run list \
            --repo "$APT_REPO" \
            --workflow publish-apt.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')"
          echo "previous publish-apt run id: $previous_id"

          gh workflow run publish-apt.yml \
            --repo "$APT_REPO" \
            --ref main \
            -f "tag=$TAG" \
            -f "source_repo=$SOURCE_REPO"

          # GitHub takes a few seconds to register the dispatch; poll for it.
          new_id=""
          for _ in $(seq 1 30); do
            sleep 2
            candidate="$(gh run list \
              --repo "$APT_REPO" \
              --workflow publish-apt.yml \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')"
            if [ "$candidate" != "$previous_id" ] && [ "$candidate" != "0" ]; then
              new_id="$candidate"
              break
            fi
          done

          if [ -z "$new_id" ]; then
            echo "::error::publish-apt.yml did not register a new run within 60s."
            echo "::error::Recover with: gh workflow run publish-apt.yml --repo $APT_REPO --ref main -f tag=$TAG -f source_repo=$SOURCE_REPO"
            exit 1
          fi
          echo "::notice::publish-apt run $new_id dispatched for $TAG on $APT_REPO"
