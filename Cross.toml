# `cross` build configuration for the Linux release targets.
#
# `tbo-audio` links against ALSA (via rodio's cpal backend), so the target
# architecture's `libasound2-dev` and `pkg-config` must be present inside the
# cross container before building.

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes pkg-config libasound2-dev:$CROSS_DEB_ARCH",
]

[target.x86_64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes pkg-config libasound2-dev:$CROSS_DEB_ARCH",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes pkg-config libasound2-dev:$CROSS_DEB_ARCH",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
]
